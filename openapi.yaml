openapi: 3.0.3
info:
  title: AI 食物卡路里辨識系統 API
  description: |
    一套完整的 AI 識別食物卡路里 Web 應用程式 API
    包含會員系統、拍照辨識、飲食記錄、數據分析等功能
  version: 1.0.0
  contact:
    name: API Support
    email: support@calorie-ai.com

servers:
  - url: https://api.calorie-ai.com/v1
    description: Production server
  - url: http://localhost:3000/api/v1
    description: Development server

tags:
  - name: Auth
    description: 認證與授權相關 API
  - name: User
    description: 會員管理相關 API
  - name: Food Recognition
    description: AI 食物辨識相關 API
  - name: Meal Records
    description: 飲食記錄相關 API
  - name: Nutrition
    description: 營養資料相關 API
  - name: Analytics
    description: 數據分析相關 API
  - name: Food Database
    description: 食物資料庫相關 API
  - name: Social
    description: 社群功能相關 API

paths:
  # ==================== 認證相關 ====================
  /auth/register:
    post:
      tags:
        - Auth
      summary: 會員註冊
      description: 使用 Email 註冊新帳號
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: SecurePass123!
                name:
                  type: string
                  example: 王小明
                dateOfBirth:
                  type: string
                  format: date
                  example: 1990-01-01
                gender:
                  type: string
                  enum: [male, female, other]
                  example: male
                height:
                  type: number
                  description: 身高(公分)
                  example: 170
                weight:
                  type: number
                  description: 體重(公斤)
                  example: 65
                targetWeight:
                  type: number
                  description: 目標體重(公斤)
                  example: 60
      responses:
        '201':
          description: 註冊成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 註冊成功，請查收驗證郵件
                  data:
                    type: object
                    properties:
                      userId:
                        type: string
                        example: usr_1234567890
                      email:
                        type: string
                        example: user@example.com
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email 已被註冊
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - Auth
      summary: 會員登入
      description: 使用 Email 和密碼登入
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: SecurePass123!
                rememberMe:
                  type: boolean
                  example: true
      responses:
        '200':
          description: 登入成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      refreshToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/oauth/{provider}:
    get:
      tags:
        - Auth
      summary: OAuth 登入
      description: 使用第三方服務登入 (Google/Apple)
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, apple]
      responses:
        '302':
          description: 重定向到 OAuth 提供商

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: 刷新 Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token 刷新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: 忘記密碼
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: 重置郵件已發送

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: 重置密碼
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: 密碼重置成功

  # ==================== 會員管理 ====================
  /users/me:
    get:
      tags:
        - User
      summary: 取得當前會員資料
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功取得會員資料
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    patch:
      tags:
        - User
      summary: 更新會員資料
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                dateOfBirth:
                  type: string
                  format: date
                gender:
                  type: string
                  enum: [male, female, other]
                height:
                  type: number
                weight:
                  type: number
                targetWeight:
                  type: number
                activityLevel:
                  type: string
                  enum: [sedentary, light, moderate, active, very_active]
                dailyCalorieGoal:
                  type: number
                avatar:
                  type: string
                  format: uri
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'

    delete:
      tags:
        - User
      summary: 刪除帳號
      security:
        - BearerAuth: []
      responses:
        '204':
          description: 帳號已刪除

  /users/me/password:
    put:
      tags:
        - User
      summary: 修改密碼
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: 密碼修改成功

  /users/me/goals:
    get:
      tags:
        - User
      summary: 取得目標設定
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功取得目標設定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGoals'
    
    put:
      tags:
        - User
      summary: 更新目標設定
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserGoals'
      responses:
        '200':
          description: 目標設定更新成功

  /users/me/preferences:
    get:
      tags:
        - User
      summary: 取得偏好設定
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功取得偏好設定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
    
    put:
      tags:
        - User
      summary: 更新偏好設定
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferences'
      responses:
        '200':
          description: 偏好設定更新成功

  # ==================== AI 食物辨識 ====================
  /recognition/upload:
    post:
      tags:
        - Food Recognition
      summary: 上傳圖片進行食物辨識
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: 食物圖片 (支援 JPG, PNG, HEIC)
                mealType:
                  type: string
                  enum: [breakfast, lunch, dinner, snack]
                  description: 餐點類型
                timestamp:
                  type: string
                  format: date-time
                  description: 拍攝時間
      responses:
        '200':
          description: 辨識成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      recognitionId:
                        type: string
                        example: rec_1234567890
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/RecognizedFood'
                      totalCalories:
                        type: number
                        example: 520
                      totalNutrition:
                        $ref: '#/components/schemas/Nutrition'
                      imageUrl:
                        type: string
                        format: uri
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          description: 圖片檔案過大

  /recognition/{recognitionId}:
    get:
      tags:
        - Food Recognition
      summary: 取得辨識結果
      security:
        - BearerAuth: []
      parameters:
        - name: recognitionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功取得辨識結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecognitionResult'
    
    patch:
      tags:
        - Food Recognition
      summary: 修正辨識結果
      security:
        - BearerAuth: []
      parameters:
        - name: recognitionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      itemId:
                        type: string
                      foodName:
                        type: string
                      servingSize:
                        type: number
                      calories:
                        type: number
                      nutrition:
                        $ref: '#/components/schemas/Nutrition'
      responses:
        '200':
          description: 修正成功

  /recognition/{recognitionId}/save:
    post:
      tags:
        - Food Recognition
      summary: 儲存辨識結果到飲食記錄
      security:
        - BearerAuth: []
      parameters:
        - name: recognitionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mealType
              properties:
                mealType:
                  type: string
                  enum: [breakfast, lunch, dinner, snack]
                timestamp:
                  type: string
                  format: date-time
                notes:
                  type: string
      responses:
        '201':
          description: 儲存成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      mealRecordId:
                        type: string

  # ==================== 飲食記錄 ====================
  /meals:
    get:
      tags:
        - Meal Records
      summary: 取得飲食記錄列表
      security:
        - BearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: 開始日期
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: 結束日期
        - name: mealType
          in: query
          schema:
            type: string
            enum: [breakfast, lunch, dinner, snack]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功取得飲食記錄
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      meals:
                        type: array
                        items:
                          $ref: '#/components/schemas/MealRecord'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
    
    post:
      tags:
        - Meal Records
      summary: 手動新增飲食記錄
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mealType
                - items
              properties:
                mealType:
                  type: string
                  enum: [breakfast, lunch, dinner, snack]
                timestamp:
                  type: string
                  format: date-time
                items:
                  type: array
                  items:
                    type: object
                    required:
                      - foodId
                      - servingSize
                    properties:
                      foodId:
                        type: string
                      foodName:
                        type: string
                      servingSize:
                        type: number
                      unit:
                        type: string
                notes:
                  type: string
      responses:
        '201':
          description: 新增成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MealRecord'

  /meals/{mealId}:
    get:
      tags:
        - Meal Records
      summary: 取得單筆飲食記錄
      security:
        - BearerAuth: []
      parameters:
        - name: mealId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功取得飲食記錄
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MealRecord'
    
    patch:
      tags:
        - Meal Records
      summary: 更新飲食記錄
      security:
        - BearerAuth: []
      parameters:
        - name: mealId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mealType:
                  type: string
                  enum: [breakfast, lunch, dinner, snack]
                timestamp:
                  type: string
                  format: date-time
                items:
                  type: array
                  items:
                    type: object
                notes:
                  type: string
      responses:
        '200':
          description: 更新成功
    
    delete:
      tags:
        - Meal Records
      summary: 刪除飲食記錄
      security:
        - BearerAuth: []
      parameters:
        - name: mealId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 刪除成功

  /meals/daily-summary:
    get:
      tags:
        - Meal Records
      summary: 取得每日摘要
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 成功取得每日摘要
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/DailySummary'

  /meals/favorites:
    get:
      tags:
        - Meal Records
      summary: 取得常用食物
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功取得常用食物
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FoodItem'
    
    post:
      tags:
        - Meal Records
      summary: 加入常用食物
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - foodId
              properties:
                foodId:
                  type: string
      responses:
        '201':
          description: 加入成功

  # ==================== 營養資料 ====================
  /nutrition/water:
    get:
      tags:
        - Nutrition
      summary: 取得水分攝取記錄
      security:
        - BearerAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 成功取得水分記錄
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      date:
                        type: string
                        format: date
                      totalMl:
                        type: number
                      goal:
                        type: number
                      records:
                        type: array
                        items:
                          type: object
                          properties:
                            timestamp:
                              type: string
                              format: date-time
                            amount:
                              type: number
    
    post:
      tags:
        - Nutrition
      summary: 記錄水分攝取
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  description: 水量(毫升)
                timestamp:
                  type: string
                  format: date-time
      responses:
        '201':
          description: 記錄成功

  /nutrition/exercise:
    get:
      tags:
        - Nutrition
      summary: 取得運動記錄
      security:
        - BearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 成功取得運動記錄
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExerciseRecord'
    
    post:
      tags:
        - Nutrition
      summary: 記錄運動
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - exerciseType
                - duration
              properties:
                exerciseType:
                  type: string
                  example: running
                duration:
                  type: number
                  description: 運動時間(分鐘)
                caloriesBurned:
                  type: number
                intensity:
                  type: string
                  enum: [low, moderate, high]
                timestamp:
                  type: string
                  format: date-time
                notes:
                  type: string
      responses:
        '201':
          description: 記錄成功

  /nutrition/weight:
    get:
      tags:
        - Nutrition
      summary: 取得體重記錄
      security:
        - BearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 成功取得體重記錄
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        weight:
                          type: number
                        bmi:
                          type: number
                        bodyFat:
                          type: number
    
    post:
      tags:
        - Nutrition
      summary: 記錄體重
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - weight
              properties:
                weight:
                  type: number
                  description: 體重(公斤)
                bodyFat:
                  type: number
                  description: 體脂率(%)
                date:
                  type: string
                  format: date
      responses:
        '201':
          description: 記錄成功

  # ==================== 數據分析 ====================
  /analytics/overview:
    get:
      tags:
        - Analytics
      summary: 取得總覽數據
      security:
        - BearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [week, month, year]
            default: week
      responses:
        '200':
          description: 成功取得總覽數據
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      period:
                        type: string
                      averageCalories:
                        type: number
                      averageProtein:
                        type: number
                      averageCarbs:
                        type: number
                      averageFat:
                        type: number
                      goalCompletionRate:
                        type: number
                      weightChange:
                        type: number
                      consecutiveDays:
                        type: integer

  /analytics/calories-trend:
    get:
      tags:
        - Analytics
      summary: 取得卡路里趨勢
      security:
        - BearerAuth: []
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 成功取得趨勢數據
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        calories:
                          type: number
                        goal:
                          type: number

  /analytics/nutrition-balance:
    get:
      tags:
        - Analytics
      summary: 營養素平衡分析
      security:
