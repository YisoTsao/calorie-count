  # ==================== 社群功能 ====================
  /social/posts:
    get:
      tags:
        - Social
      summary: 取得動態牆貼文
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [all, friends, mine]
            default: all
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功取得貼文列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      posts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Post'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
    
    post:
      tags:
        - Social
      summary: 發布貼文
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                mealRecordId:
                  type: string
                images:
                  type: array
                  items:
                    type: string
                    format: uri
                visibility:
                  type: string
                  enum: [public, friends, private]
                  default: public
      responses:
        '201':
          description: 發布成功

  /social/posts/{postId}/like:
    post:
      tags:
        - Social
      summary: 按讚貼文
      security:
        - BearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 按讚成功
    
    delete:
      tags:
        - Social
      summary: 取消按讚
      security:
        - BearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 取消成功

  /social/posts/{postId}/comments:
    get:
      tags:
        - Social
      summary: 取得貼文留言
      security:
        - BearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功取得留言
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
    
    post:
      tags:
        - Social
      summary: 留言
      security:
        - BearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
      responses:
        '201':
          description: 留言成功

  /social/friends:
    get:
      tags:
        - Social
      summary: 取得好友列表
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功取得好友列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friend'
    
    post:
      tags:
        - Social
      summary: 新增好友
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
      responses:
        '201':
          description: 好友請求已發送

  /social/friends/{userId}:
    delete:
      tags:
        - Social
      summary: 刪除好友
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 已刪除好友

  /social/leaderboard:
    get:
      tags:
        - Social
      summary: 取得排行榜
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [calories, streak, weight_loss]
            default: streak
        - name: period
          in: query
          schema:
            type: string
            enum: [week, month, all_time]
            default: week
      responses:
        '200':
          description: 成功取得排行榜
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        rank:
                          type: integer
                        user:
                          $ref: '#/components/schemas/User'
                        score:
                          type: number

# ==================== Components ====================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: usr_1234567890
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: 王小明
        avatar:
          type: string
          format: uri
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female, other]
        height:
          type: number
          description: 身高(公分)
        weight:
          type: number
          description: 體重(公斤)
        targetWeight:
          type: number
        activityLevel:
          type: string
          enum: [sedentary, light, moderate, active, very_active]
        dailyCalorieGoal:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserGoals:
      type: object
      properties:
        goalType:
          type: string
          enum: [lose_weight, gain_weight, maintain]
        targetWeight:
          type: number
        dailyCalorieGoal:
          type: number
        proteinGoal:
          type: number
        carbsGoal:
          type: number
        fatGoal:
          type: number
        waterGoal:
          type: number
        weeklyWeightChangeGoal:
          type: number
        targetDate:
          type: string
          format: date

    UserPreferences:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, auto]
        language:
          type: string
          example: zh-TW
        units:
          type: string
          enum: [metric, imperial]
        notifications:
          type: object
          properties:
            mealReminders:
              type: boolean
            waterReminders:
              type: boolean
            goalReminders:
              type: boolean
            socialUpdates:
              type: boolean
        privacy:
          type: object
          properties:
            profileVisibility:
              type: string
              enum: [public, friends, private]
            showWeight:
              type: boolean
            showProgress:
              type: boolean

    Nutrition:
      type: object
      properties:
        calories:
          type: number
          example: 250
        protein:
          type: number
          example: 15.5
        carbs:
          type: number
          example: 30.2
        fat:
          type: number
          example: 8.3
        fiber:
          type: number
          example: 3.5
        sugar:
          type: number
          example: 5.2
        sodium:
          type: number
          example: 350

    RecognizedFood:
      type: object
      properties:
        itemId:
          type: string
        foodId:
          type: string
        foodName:
          type: string
          example: 白飯
        confidence:
          type: number
          description: 辨識信心度 (0-1)
          example: 0.95
        servingSize:
          type: number
          example: 150
        unit:
          type: string
          example: 克
        calories:
          type: number
          example: 210
        nutrition:
          $ref: '#/components/schemas/Nutrition'
        boundingBox:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
            width:
              type: number
            height:
              type: number

    RecognitionResult:
      type: object
      properties:
        recognitionId:
          type: string
        imageUrl:
          type: string
          format: uri
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecognizedFood'
        totalCalories:
          type: number
        totalNutrition:
          $ref: '#/components/schemas/Nutrition'
        createdAt:
          type: string
          format: date-time

    MealRecord:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        mealType:
          type: string
          enum: [breakfast, lunch, dinner, snack]
        timestamp:
          type: string
          format: date-time
        items:
          type: array
          items:
            type: object
            properties:
              foodId:
                type: string
              foodName:
                type: string
              servingSize:
                type: number
              unit:
                type: string
              calories:
                type: number
              nutrition:
                $ref: '#/components/schemas/Nutrition'
        totalCalories:
          type: number
        totalNutrition:
          $ref: '#/components/schemas/Nutrition'
        imageUrl:
          type: string
          format: uri
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    DailySummary:
      type: object
      properties:
        date:
          type: string
          format: date
        totalCalories:
          type: number
        calorieGoal:
          type: number
        totalNutrition:
          $ref: '#/components/schemas/Nutrition'
        waterIntake:
          type: number
        waterGoal:
          type: number
        exerciseCalories:
          type: number
        netCalories:
          type: number
        mealBreakdown:
          type: object
          properties:
            breakfast:
              type: number
            lunch:
              type: number
            dinner:
              type: number
            snack:
              type: number

    FoodItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nameEn:
          type: string
        category:
          type: string
        brand:
          type: string
        servingSize:
          type: number
        unit:
          type: string
        calories:
          type: number
        nutrition:
          $ref: '#/components/schemas/Nutrition'
        imageUrl:
          type: string
          format: uri
        barcode:
          type: string
        ingredients:
          type: array
          items:
            type: string
        allergens:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    ExerciseRecord:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        exerciseType:
          type: string
        duration:
          type: number
        caloriesBurned:
          type: number
        intensity:
          type: string
          enum: [low, moderate, high]
        timestamp:
          type: string
          format: date-time
        notes:
          type: string

    Post:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            avatar:
              type: string
        content:
          type: string
        mealRecord:
          $ref: '#/components/schemas/MealRecord'
        images:
          type: array
          items:
            type: string
            format: uri
        visibility:
          type: string
          enum: [public, friends, private]
        likesCount:
          type: integer
        commentsCount:
          type: integer
        isLiked:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: string
        postId:
          type: string
        userId:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            avatar:
              type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    Friend:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        avatar:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected]
        consecutiveDays:
          type: integer
        since:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: 請求參數有誤
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

  responses:
    BadRequest:
      description: 請求參數錯誤
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Unauthorized:
      description: 未授權或 Token 無效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFound:
      description: 資源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    ServerError:
      description: 伺服器錯誤
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
